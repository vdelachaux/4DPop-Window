name: Build
on:
  push:
    paths:
      - '**.4dm'
      - '**.yml'
  pull_request:
    paths:
      - '**.4dm'
  workflow_dispatch:

jobs:
  build:
    name: "Build on ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
# Get dependencies
    - name: Get Color with Classes
      uses: actions/checkout@v4
      with:
        repository: vdelachaux/Color-with-Classes
        path: Components/Color with Classes.4dbase
    - name: Get SVG with Classes
      uses: actions/checkout@v4
      with:
        repository: vdelachaux/SVG-with-Classes
        path: Components/SVG with Classes.4dbase
    - name: Remove pre-built SVG to force recompilation with Color available
      shell: bash
      run: rm -rf "Components/SVG with Classes.4dbase/BUILD/Components/SVG with Classes.4dbase"
    - name: Get 4DPop
      uses: actions/checkout@v4
      with:
        repository: vdelachaux/4DPop
        path: Components/4DPop.4dbase
    - name: Build
      uses: 4d/build4d-action@main
      with:
        product-line: vcs
        version: vcs
        build: official
        token: ${{ secrets.DLTK }}